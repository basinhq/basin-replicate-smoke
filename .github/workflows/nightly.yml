name: Nightly E2E tests

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      cli_tag:
        description: Pack image tag holding the CLI under test
        default: latest

permissions:
  contents: read

env:
  BASIN_ACCEPTANCE_TEST_SCALE: xl

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  scenarios:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install --yes just
      - name: Run full suite shard ${{ matrix.shard }}
        env:
          BASIN_CLI_TAG: ${{ inputs.cli_tag || 'latest' }}
        run: just shard e2e-full "${{ matrix.shard }}" 4
      - name: Add results to job summary
        if: always()
        run: cat artifacts/results-*.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-e2e-results-shard-${{ matrix.shard }}
          path: artifacts/
          if-no-files-found: warn
